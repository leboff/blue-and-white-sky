services:
  api:
    build: .
    command: uvicorn psu_feed.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - psu_feed_data:/app/data
    restart: unless-stopped

  ingester:
    build: .
    command: python -m psu_feed.ingester
    volumes:
      - psu_feed_data:/app/data
    restart: unless-stopped
    depends_on:
      - api

volumes:
  psu_feed_data:
